services:
  why_is_docker_the_best:
    image: ghcr.io/akasiek/why_is_docker_the_best:latest
    restart: unless-stopped

    # If mounting data volume as a path on the host, ensure it has appropriate permissions for the container user.
    user: "${UID:-1000}:${GID:-1000}"

    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL # Drop all Linux capabilities. The application doesn't need any special permissions.

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - why_is_docker_the_best
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
